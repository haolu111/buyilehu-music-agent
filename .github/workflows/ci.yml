name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  java:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/music-agent-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
          cache: maven
      - name: Test Java service
        run: mvn -B test

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/python-capability-library
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/python-capability-library/requirements.txt
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Test Python capability service
        run: python -m unittest discover -s tests -v

  web:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app:
          - frontend/teacher-web
          - frontend/student-web
          - backend/python-capability-library/frontend-demo
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests when configured
        run: npm test --if-present
      - name: Build web application
        run: npm run build

  images:
    runs-on: ubuntu-latest
    needs: [java, python, web]
    strategy:
      matrix:
        include:
          - name: music-agent-server
            context: backend/music-agent-server
          - name: python-capability-library
            context: backend/python-capability-library
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and optionally publish image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose configuration
        run: docker compose config --quiet
