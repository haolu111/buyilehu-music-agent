name: buyilehu-music-agent

services:
  mysql:
    image: mysql:8.0.36
    environment:
      MYSQL_DATABASE: ${DB_NAME:-buyilehu_music_agent}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --slow-query-log=ON
      - --slow-query-log-file=/var/lib/mysql/mysql-slow.log
      - --long-query-time=${MYSQL_LONG_QUERY_TIME:-0.5}
      - --log-queries-not-using-indexes=ON
      - --min-examined-row-limit=100
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      TZ: Asia/Shanghai
    ports:
      - "${RABBITMQ_PORT:-5673}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  python-capability:
    build:
      context: ./backend/python-capability-library
    environment:
      CHAT_ECNU_API_KEY: ${CHAT_ECNU_API_KEY:-}
      CHAT_ECNU_MODEL: ${CHAT_ECNU_MODEL:-ecnu-max}
      DOUBAO_API_KEY: ${DOUBAO_API_KEY:-}
      DOUBAO_MODEL: ${DOUBAO_MODEL:-}
      DOUBAO_BASE_URL: ${DOUBAO_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}
      TZ: Asia/Shanghai
    ports:
      - "${PYTHON_CAPABILITY_PORT:-8001}:8001"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/v1/health', timeout=2)"
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  java-server:
    build:
      context: ./backend/music-agent-server
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-buyilehu_music_agent}
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ""

      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      PYTHON_CAPABILITY_BASE_URL: http://python-capability:8001
      PYTHON_CAPABILITY_CALL_MODE: ${PYTHON_CAPABILITY_CALL_MODE:-primary}
      STORAGE_PATH: /app/storage/uploads
      TZ: Asia/Shanghai
    ports:
      - "${JAVA_SERVER_PORT:-8080}:8080"
    volumes:
      - lesson-storage:/app/storage/uploads
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      python-capability:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - curl
        - --fail
        - --silent
        - http://127.0.0.1:8080/actuator/health
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s
    restart: unless-stopped

  teacher-web:
    build:
      context: ./frontend
      dockerfile: teacher-web/Dockerfile
    ports:
      - "${TEACHER_WEB_PORT:-5173}:80"
    depends_on:
      java-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  student-web:
    build:
      context: ./frontend
      dockerfile: student-web/Dockerfile
    ports:
      - "${STUDENT_WEB_PORT:-5174}:80"
    depends_on:
      java-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped  

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
  lesson-storage:
