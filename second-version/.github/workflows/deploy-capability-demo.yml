name: Deploy capability library demos

on:
  push:
    branches: [main]
    paths:
      - "backend/python-capability-library/frontend-demo/**"
      - ".github/workflows/deploy-capability-demo.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/python-capability-library/frontend-demo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/python-capability-library/frontend-demo/package-lock.json
      - uses: actions/configure-pages@v5
      - run: npm ci
      - run: npm test
      - run: npm run build
      - run: test -s dist/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: backend/python-capability-library/frontend-demo/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
