spring:
  datasource:
    url: jdbc:h2:mem:music_agent;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    show-sql: false

logging:
  level:
    com.buyilehu.musicagent: DEBUG
