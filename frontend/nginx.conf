server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://java-server:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # Both formal teacher/student images embed the same reviewed activity build.
    location /template-console/ {
        try_files $uri $uri/ =404;
    }

    # Reviewed activities load sampled instruments, skins and other runtime
    # media from this stable URL. The assets are packaged under /static/assets.
    location /runtime-assets/ {
        alias /usr/share/nginx/html/static/assets/;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
